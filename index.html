<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konverter Teks ke PDF Modern</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>Konverter Teks ke PDF</h1>
            <p>Ubah teks atau catatan Anda menjadi dokumen PDF siap cetak langsung dari browser.</p>
        </header>
        
        <main>
            <div class="form-group">
                <label for="titleInput">Judul Dokumen</label>
                <input type="text" id="titleInput" placeholder="Contoh: Laporan Keuangan, Cerita Pendek..." autocomplete="off">
            </div>

            <div class="form-group">
                <label for="textInput">Isi Teks / Konten</label>
                <textarea id="textInput" rows="12" placeholder="Ketik atau tempel teks Anda di sini..."></textarea>
            </div>

            <button id="btnGenerate" class="btn-primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Unduh Sebagai PDF
            </button>
        </main>

        <footer>
            <p>Diposting secara aman via GitHub Pages • Berjalan 100% di sisi klien</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
