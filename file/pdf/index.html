<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Lowongan + Watermark</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="app-wrapper">
    <div class="form-side">
        <div class="form-group">
            <label>📁 Nama PDF (tanpa .pdf)</label>
            <input type="text" id="pdfFileName" value="lowongan_watermark">
        </div>
        <div class="form-group">
            <label>✍️ Teks Lowongan (gunakan format seperti contoh)</label>
            <textarea id="jobTextInput" rows="20"></textarea>
            <div class="tips">Gunakan tanda strip (-) untuk bullet list. Baris pertama otomatis jadi judul. Baris dengan "Nomor:" atau "Perihal:" akan masuk ke meta-info.</div>
        </div>
        <button id="downloadBtn">📥 Download PDF (dengan watermark)</button>
    </div>
    <div class="preview-side">
        <div class="preview-label">📄 Preview PDF (watermark & teks)</div>
        <div id="livePreview" class="pdf-preview"></div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
