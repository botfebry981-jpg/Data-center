<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat PDF Lowongan - Gaya Seperti Gambar</title>
    <!-- html2pdf bundle -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e2e8f0 0%, #f1f5f9 100%);
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        /* card utama */
        .app-card {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            transition: 0.2s;
        }

        /* header */
        .header {
            background: #1e293b;
            padding: 1.3rem 2rem;
            text-align: center;
        }
        .header h1 {
            font-size: 1.8rem;
            color: white;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .header p {
            color: #94a3b8;
            margin-top: 0.3rem;
        }

        /* dua kolom */
        .two-columns {
            display: flex;
            flex-wrap: wrap;
            gap: 1.8rem;
            padding: 2rem;
        }
        .input-area {
            flex: 1;
            min-width: 260px;
        }
        .preview-area {
            flex: 1.2;
            min-width: 280px;
            background: #fef9ef;
            border-radius: 1.5rem;
            padding: 1.2rem;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05), 0 8px 20px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            font-weight: 700;
            display: block;
            margin-bottom: 0.5rem;
            color: #0f172a;
            font-size: 0.9rem;
        }
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #cbd5e1;
            border-radius: 1rem;
            font-family: monospace;
            font-size: 0.9rem;
            transition: 0.2s;
            resize: vertical;
        }
        input:focus, textarea:focus {
            border-color: #f97316;
            outline: none;
            box-shadow: 0 0 0 3px rgba(249,115,22,0.2);
        }
        textarea {
            min-height: 380px;
            font-family: 'Courier New', monospace;
        }
        button {
            background: #f97316;
            border: none;
            width: 100%;
            padding: 12px;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        button:hover {
            background: #ea580c;
            transform: scale(0.98);
        }

        /* style preview / hasil PDF (persis seperti gambar lowongan) */
        .pdf-preview {
            background: white;
            padding: 24px 22px;
            border-radius: 1.2rem;
            font-family: 'Times New Roman', Georgia, serif;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .preview-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 12px;
            color: #b45309;
            letter-spacing: 1px;
        }
        .job-header-preview {
            text-align: center;
            margin-bottom: 18px;
        }
        .job-header-preview h2 {
            font-size: 20px;
            font-weight: 800;
            text-transform: uppercase;
            color: #c2410c;
            background: #fff0e0;
            display: inline-block;
            padding: 5px 18px;
            border-radius: 30px;
        }
        .job-location {
            font-size: 15px;
            font-weight: bold;
            margin-top: 10px;
            border-top: 2px solid #fed7aa;
            border-bottom: 2px solid #fed7aa;
            padding: 6px 0;
            background: #fffaf5;
            text-align: center;
        }
        .section-title-preview {
            font-weight: 800;
            font-size: 17px;
            margin: 18px 0 8px 0;
            color: #2c3e66;
            border-left: 5px solid #f97316;
            padding-left: 12px;
        }
        .custom-list {
            margin: 6px 0 8px 25px;
            list-style: none;
        }
        .custom-list li {
            margin-bottom: 6px;
            position: relative;
            padding-left: 20px;
        }
        .custom-list li::before {
            content: "•";
            color: #e67e22;
            font-weight: bold;
            font-size: 18px;
            position: absolute;
            left: 0;
            top: -2px;
        }
        .contact-box-preview {
            background: #fef2e0;
            padding: 10px 16px;
            border-radius: 18px;
            margin: 15px 0 12px;
            border: 1px solid #ffd9a5;
            text-align: center;
            font-weight: bold;
        }
        .footer-preview {
            text-align: center;
            margin-top: 20px;
            border-top: 1px solid #f0d5b0;
            padding-top: 10px;
            font-weight: bold;
            font-size: 13px;
            color: #4a3b2c;
        }
        hr {
            margin: 8px 0;
            border: 0;
            height: 1px;
            background: #ffe0b5;
        }
        .note-small {
            font-size: 9px;
            text-align: center;
            color: #8b7a66;
        }
    </style>
</head>
<body>
<div class="app-card">
    <div class="header">
        <h1>📄 PDF Lowongan Kerja</h1>
        <p>Berdasarkan teks Anda → PDF gaya seperti gambar</p>
    </div>
    <div class="two-columns">
        <!-- KIRI: input nama pdf + teks -->
        <div class="input-area">
            <div class="form-group">
                <label>📁 Nama PDF (tanpa .pdf)</label>
                <input type="text" id="pdfFileName" placeholder="misal: lowongan_fotokopi" value="lowongan_staff">
            </div>
            <div class="form-group">
                <label>✍️ Isi Teks Lowongan (format bebas, gunakan - untuk bullet)</label>
                <textarea id="jobTextInput" placeholder="Tulis teks lowongan di sini...&#10;Contoh format:&#10;DIBUTUHKAN STAFF WANITA UNTUK JAGA KIOS FOTOCOPY&#10;DI DEPAN KAMPUS UNSULTRA BARUGA&#10;&#10;KUALIFIKASI:&#10;- Usia Maksimal 30 Tahun&#10;- Pendidikan Minimal SMA&#10;&#10;SYARAT BERKAS:&#10;- Pasfoto 3x4&#10;- CV, KTP&#10;&#10;KIRIM KE WA: 0821 8841 1841"></textarea>
                <div style="font-size: 11px; margin-top: 5px; color: #f97316;">💡 Tips: tulis judul di awal, gunakan tanda strip (-) untuk membuat bullet, tulis "KUALIFIKASI:" dll agar lebih rapi. Hasil PDF akan otomatis diformat mirip gambar lowongan.</div>
            </div>
            <button id="downloadBtn">📥 Download PDF</button>
        </div>

        <!-- KANAN: preview realtime -->
        <div class="preview-area">
            <div class="preview-label">📄 Preview PDF (sesuai yang akan didownload)</div>
            <div id="livePreview" class="pdf-preview">
                <!-- preview akan diisi javascript -->
            </div>
        </div>
    </div>
</div>

<script>
    // Elemen
    const fileNameInput = document.getElementById('pdfFileName');
    const textInput = document.getElementById('jobTextInput');
    const previewDiv = document.getElementById('livePreview');
    const downloadBtn = document.getElementById('downloadBtn');

    // Fungsi escape HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Fungsi untuk mengubah teks mentah menjadi HTML dengan gaya lowongan (mirip gambar)
    function formatTextToJobHTML(rawText) {
        if (!rawText.trim()) return '<p><em>Kosong — tulis teks lowongan di kolom kiri</em></p>';
        
        let lines = rawText.split(/\r?\n/);
        let output = "";
        let inBullet = false;
        let bulletItems = [];
        let currentSectionTitle = "";
        let mainTitle = "";
        let subLocation = "";
        
        function flushBulletSection() {
            if (bulletItems.length === 0) return;
            let html = `<div class="section-title-preview">${escapeHtml(currentSectionTitle)}</div>`;
            html += `<ul class="custom-list">`;
            bulletItems.forEach(item => {
                html += `<li>${escapeHtml(item)}</li>`;
            });
            html += `</ul>`;
            output += html;
            bulletItems = [];
            inBullet = false;
        }
        
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line === "") continue;
            
            if (line.startsWith('-') || line.startsWith('•') || line.startsWith('*')) {
                let cleanItem = line.replace(/^[-•*]\s*/, '');
                if (!inBullet) {
                    if (currentSectionTitle === "") {
                        currentSectionTitle = "KETERANGAN";
                    }
                    inBullet = true;
                }
                bulletItems.push(cleanItem);
            } 
            else {
                if (inBullet) {
                    flushBulletSection();
                    inBullet = false;
                }
                let isSectionTitle = false;
                if (line.length < 60 && (line === line.toUpperCase() || line.endsWith(':'))) {
                    isSectionTitle = true;
                    let titleClean = line.replace(/:$/, '');
                    currentSectionTitle = titleClean;
                    let nextLine = (i+1 < lines.length) ? lines[i+1].trim() : "";
                    if (nextLine.startsWith('-') || nextLine.startsWith('•') || nextLine.startsWith('*')) {
                        continue;
                    } else {
                        output += `<div class="section-title-preview">${escapeHtml(titleClean)}</div>`;
                        currentSectionTitle = "";
                    }
                }
                else {
                    if (output === "" && !mainTitle) {
                        mainTitle = line;
                        output += `<div class="job-header-preview"><h2>${escapeHtml(mainTitle)}</h2>`;
                        let potentialLoc = (i+1 < lines.length) ? lines[i+1].trim() : "";
                        if (potentialLoc && !potentialLoc.startsWith('-') && potentialLoc !== potentialLoc.toUpperCase()) {
                            subLocation = potentialLoc;
                            output += `<div class="job-location">📍 ${escapeHtml(subLocation)}</div>`;
                            i++;
                        } else {
                            output += `<div class="job-location">📍 Lokasi tersedia</div>`;
                        }
                        output += `</div>`;
                    }
                    else {
                        output += `<p style="margin: 8px 0;">${escapeHtml(line)}</p>`;
                    }
                }
            }
        }
        if (inBullet && bulletItems.length > 0) {
            flushBulletSection();
        }
        
        if (output === "") {
            output = `<div class="job-header-preview"><h2>${escapeHtml(rawText.substring(0,60))}</h2><div class="job-location">📍 Lowongan</div></div>`;
        }
        
        let lower = rawText.toLowerCase();
        if (lower.includes('wa') || lower.includes('whatsapp') || lower.includes('0821') || lower.includes('085')) {
            let waMatch = rawText.match(/08[0-9]{8,11}/);
            if (waMatch) {
                let waNumber = waMatch[0];
                output += `<div class="contact-box-preview">📞 Kirim ke WhatsApp: ${waNumber}</div>`;
            } else {
                output += `<div class="contact-box-preview">📞 Hubungi via WhatsApp (lihat detail di atas)</div>`;
            }
        }
        output += `<div class="footer-preview">⚡ SEGERA DAFTARKAN DIRIMU! ⚡<br>Loker Kendari Official</div>`;
        output += `<hr><div class="note-small">* Dokumen resmi lowongan pekerjaan</div>`;
        return output;
    }
    
    // Update preview setiap kali input berubah
    function updatePreview() {
        let rawText = textInput.value;
        if (rawText.trim() === "") {
            rawText = `DIBUTUHKAN STAFF WANITA UNTUK JAGA KIOS FOTOCOPY
DI DEPAN KAMPUS UNSULTRA BARUGA

KUALIFIKASI:
- Usia Maksimal 30 Tahun
- Pendidikan Minimal SMA Sederajat
- Tidak Sedang Kuliah
- Belum Menikah
- Mampu Mengoperasikan Komputer (Minimal Microsoft Word)
- Berdomisili Tempat Tinggal di Baruga
- Jujur, Disiplin dan Bertanggung Jawab

SYARAT BERKAS:
- Pasfoto Ukuran 3x4
- CV, KTP, KK, Ijazah

CATATAN PENGIRIMAN:
Semua Berkas dijadikan Satu File PDF dan dikirimkan langsung melalui WhatsApp ke nomor: 0821 8841 1841`;
            textInput.value = rawText;
        }
        let htmlContent = formatTextToJobHTML(rawText);
        previewDiv.innerHTML = htmlContent;
    }
    
    // Fungsi download PDF menggunakan html2pdf dari elemen preview (clone agar tidak mengganggu tampilan)
    async function downloadPDF() {
        const originalPreview = document.getElementById('livePreview');
        const cloneDiv = originalPreview.cloneNode(true);
        cloneDiv.style.padding = "20px";
        cloneDiv.style.backgroundColor = "white";
        cloneDiv.style.width = "210mm";
        cloneDiv.style.margin = "0 auto";
        cloneDiv.style.fontFamily = "'Times New Roman', Georgia, serif";
        
        const tempContainer = document.createElement('div');
        tempContainer.appendChild(cloneDiv);
        tempContainer.style.position = "absolute";
        tempContainer.style.left = "-9999px";
        tempContainer.style.top = "0";
        document.body.appendChild(tempContainer);
        
        let fileName = fileNameInput.value.trim();
        if (fileName === "") fileName = "lowongan_pekerjaan";
        const safeName = fileName.replace(/[\\/:*?"<>|]/g, '_') + ".pdf";
        
        const opt = {
            margin:        [0.5, 0.5, 0.5, 0.5],
            filename:      safeName,
            image:         { type: 'jpeg', quality: 0.98 },
            html2canvas:   { scale: 2, letterRendering: true },
            jsPDF:         { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        
        try {
            await html2pdf().set(opt).from(cloneDiv).save();
        } catch(e) {
            alert("Gagal generate PDF: " + e.message);
        } finally {
            document.body.removeChild(tempContainer);
        }
    }
    
    // Event listeners
    textInput.addEventListener('input', updatePreview);
    downloadBtn.addEventListener('click', downloadPDF);
    
    // Inisialisasi preview dengan contoh
    updatePreview();
</script>
</body>
</html>
